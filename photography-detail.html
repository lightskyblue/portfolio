<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UX/UI Projects | Ji Long Portfolio</title>
    <link rel="stylesheet" href="./css/main.css" />
  </head>
  <body class="project-index-page">
    <header class="site-header">
      <a href="index.html" class="site-logo" aria-label="Go to homepage">
        JI LONG
      </a>

      <a
        class="contact-button"
        href="mailto:lony98.a@gmail.com"
        aria-label="Contact Ji Long"
      >
        <span>C</span>
      </a>
    </header>

    <main class="work-page page-content">
      <section class="work-hero reveal">
        <a
          class="back-button"
          href="./photography.html"
          aria-label="Back to photography"
        >
          ←
        </a>
        <div class="antenna-heading">
          <h1 id="photo-title">The Green in Japan</h1>
        </div>
      </section>
      <section
        class="photo-detail__gallery reveal"
        id="photo-gallery"
        aria-label="Photography gallery"
      ></section>
      <nav
        class="photo-detail__nav reveal"
        aria-label="Photography project navigation"
      >
        <a
          href="#"
          class="photo-detail__nav-link photo-detail__nav-link--prev"
          id="photo-prev"
        >
          ‹ Previous
        </a>

        <a
          href="#"
          class="photo-detail__nav-link photo-detail__nav-link--next"
          id="photo-next"
        >
          Next ›
        </a>
      </nav>
    </main>
    <script src="./js/main.js"></script>
    <script src="./js/photography-data.js"></script>
    <script src="./js/photography-detail.js"></script>
  </body>
</html>
